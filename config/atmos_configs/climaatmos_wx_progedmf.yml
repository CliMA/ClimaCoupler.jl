### Grid ###
h_elem: 15
z_max: 70000.0
z_elem: 70
dz_bottom: 30.0

### Time and Simulation ###
start_date: "20250831"
initial_condition: "WeatherModel"
t_end: 12hours
dt: 120secs

### Numerics ###
ode_algo: "ARS222"
max_newton_iters_ode: 3
implicit_diffusion: true
approximate_linear_solve_iters: 2
rayleigh_sponge: true
viscous_sponge: true
divergence_damping_factor: 20.0
scalar_hyperdiffusion_coefficient: 0.929738
vorticity_hyperdiffusion_coefficient: 0.1857

### Radiation ###
insolation: "timevarying"
rad: allskywithclear
dt_rad: "1hours"
time_varying_trace_gases: ["CO2", "O3"]
aerosol_radiation: true
prescribed_aerosols: ["CB1", "CB2", "DST01", "DST02", "DST03", "DST04", "DST05", "OC1", "OC2", "SO4", "SSLT01", "SSLT02", "SSLT03", "SSLT04", "SSLT05"]

### Turbulence and convection###
turbconv: "prognostic_edmfx"
edmfx_entr_model: "Generalized"
edmfx_detr_model: "Generalized"
edmfx_nh_pressure: true
edmfx_sgs_mass_flux: true
edmfx_sgs_diffusive_flux: true
edmfx_vertical_diffusion: true
edmfx_filter: true
prognostic_tke: true
edmfx_upwinding: first_order

### 0M Microphysics ##
# microphysics_model: "0M"
# toml: [toml/longrun_aquaplanet_progedmf.toml]
### 1M Microphysics ###
microphysics_model: "1M"
toml: [toml/prognostic_edmfx_1M.toml]

cloud_model: "quadrature"


### Gravity waves ###
non_orographic_gravity_wave: true
orographic_gravity_wave: "raw_topo"
