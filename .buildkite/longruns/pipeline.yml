agents:
  queue: clima
  slurm_time: 24:00:00
  modules: climacommon/2025_05_15

env:
  JULIA_LOAD_PATH: "${JULIA_LOAD_PATH}:${BUILDKITE_BUILD_CHECKOUT_PATH}/.buildkite"
  OPENBLAS_NUM_THREADS: 1
  JULIA_NVTX_CALLBACKS: gc
  OMPI_MCA_opal_warn_on_missing_libcuda: 0
  JULIA_MAX_NUM_PRECOMPILE_FILES: 100
  GKSwstype: 100
  SLURM_KILL_BAD_EXIT: 1
  CONFIG_PATH: "config/longrun_configs"

timeout_in_minutes: 1800 # 30 hours

steps:

  - label: "init clima :computer:"
    key: "init_cpu_env_clima"
    command:
      - "echo $$JULIA_DEPOT_PATH"

      - echo "--- Instantiate AMIP env"
      - "julia --project=experiments/ClimaEarth/ -e 'using Pkg; Pkg.instantiate(;verbose=true)'"
      - "julia --project=experiments/ClimaEarth/ -e 'using Pkg; Pkg.add(\"MPI\")'"
      - "julia --project=experiments/ClimaEarth/ -e 'using Pkg; Pkg.precompile()'"
      - "julia --project=experiments/ClimaEarth/ -e 'using Pkg; Pkg.status()'"

    agents:
      queue: clima
    env:
      JULIA_NUM_PRECOMPILE_TASKS: 8
      JULIA_MAX_NUM_PRECOMPILE_FILES: 50

  - wait

  - group: "Sprint simulations"

    steps:
      - label: "{{matrix.setup.microphysics}} {{matrix.setup.edmf}} AMIP with {{matrix.setup.land_model}} model and {{matrix.setup.jacobian}}"
        command: |
          srun julia --color=yes --threads=4 --project=experiments/ClimaEarth/ experiments/ClimaEarth/run_amip.jl \
            --config_file $CONFIG_PATH/amip_diagedmf_topo.yml \
            --config_file $CONFIG_PATH/{{matrix.setup.microphysics}}.yml \
            --config_file $CONFIG_PATH/{{matrix.setup.land_model}}.yml \
            --config_file $CONFIG_PATH/{{matrix.setup.edmf}}.yml \
            --config_file $CONFIG_PATH/{{matrix.setup.jacobian}}.yml \
            --job_id {{matrix.setup.microphysics}}_{{matrix.setup.edmf}}_{{matrix.setup.land_model}}_{{matrix.setup.jacobian}}
        env:
          CLIMACOMMS_CONTEXT: "MPI"
          CLIMACOMMS_DEVICE: "CUDA"
        agents:
          queue: clima
          slurm_gpus_per_task: 1
          slurm_cpus_per_task: 4
          slurm_ntasks: 1
          slurm_mem: 32GB
        matrix:
          setup:
            microphysics:
              - "0M"
              - "1M"
            land_model:
              - "bucket"
              - "full_land"
            edmf:
              - "progedmf"
              - "diagedmf"
            jacobian:
              - "autosparse_jacobian"
              - "manual_jacobian"

