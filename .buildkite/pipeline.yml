agents:
  queue: central
  slurm_time: 6:00:00
  modules: climacommon/2025_05_15

env:
  JULIA_LOAD_PATH: "${JULIA_LOAD_PATH}:${BUILDKITE_BUILD_CHECKOUT_PATH}/.buildkite"
  JULIA_DEPOT_PATH: "${BUILDKITE_BUILD_PATH}/${BUILDKITE_PIPELINE_SLUG}/depot/cpu"
  OPENBLAS_NUM_THREADS: 1
  OMPI_MCA_opal_warn_on_missing_libcuda: 0
  JULIA_MAX_NUM_PRECOMPILE_FILES: 100
  GKSwstype: 100
  SLURM_KILL_BAD_EXIT: 1
  CONFIG_PATH: "config/ci_configs"
  SWEEP_CONFIG_PATH: "config/sweep_configs"

timeout_in_minutes: 360

steps:
  - label: "init environment :computer:"
    key: "init_cpu_env"
    command:
      - echo "--- Instantiate package env"
      - "julia -O0 --project -e 'using Pkg; Pkg.instantiate(;verbose=true)'"
      - "julia -O0 --project -e 'using Pkg; Pkg.precompile()'"
      - "julia -O0 --project -e 'using Pkg; Pkg.status()'"

    #  - echo "--- Instantiate AMIP experiments env"
    #  - "julia -O0 --project=experiments/AMIP/ -e 'using Pkg; Pkg.instantiate(;verbose=true)'"
    #  - "julia -O0 --project=experiments/AMIP/ -e 'using Pkg; Pkg.precompile()'"
    #  - "julia -O0 --project=experiments/AMIP/ -e 'using Pkg; Pkg.status()'"

      # Precompile CMIP with strict bounds checking to avoid precompilation in individual
      # runs that use strict bounds checking.
      - echo "--- Instantiate CMIP experiments env with strict bounds checking"
      - "julia -O0 --check-bounds=yes --project=experiments/CMIP/ -e 'using Pkg; Pkg.instantiate(;verbose=true)'"
      - "julia -O0 --check-bounds=yes --project=experiments/CMIP/ -e 'using Pkg; Pkg.precompile()'"
      - "julia -O0 --check-bounds=yes --project=experiments/CMIP/ -e 'using Pkg; Pkg.status()'"

    #  - echo "--- Instantiate test env"
    #  - "julia -O0 --project=test/ -e 'using Pkg; Pkg.develop(path=\".\")'"
    #  - "julia -O0 --project=test/ -e 'using Pkg; Pkg.instantiate(;verbose=true)'"
    #  - "julia -O0 --project=test/ -e 'using Pkg; Pkg.precompile()'"
   #   - "julia -O0 --project=test/ -e 'using Pkg; Pkg.status()'"

    concurrency: 1
    concurrency_group: 'depot/climacoupler-ci'
    agents:
      slurm_gres: gpu:nvidia_l40s:1
      slurm_cpus_per_task: 12
      # slurm_gpus: 1
    env:
      JULIA_NUM_PRECOMPILE_TASKS: 12
      JULIA_MAX_NUM_PRECOMPILE_FILES: 50

  - wait

  - group: "CMIP Sweep"
    # Active sweep (10 jobs): production-ratio anchor, ocean coarsening (incl. ocean/cpl=20),
    # land > atmos (land decoupled from cpl), tight coupling, SYPD ceiling, synced limit,
    # fast stability edge. Remaining jobs commented for restore.
