agents:
  queue: clima
  modules: climacommon/2025_05_15

env:
  JULIA_LOAD_PATH: "${JULIA_LOAD_PATH}:${BUILDKITE_BUILD_CHECKOUT_PATH}/.buildkite"
  OPENBLAS_NUM_THREADS: 1
  OMPI_MCA_opal_warn_on_missing_libcuda: 0
  JULIA_MAX_NUM_PRECOMPILE_FILES: 100
  GKSwstype: 100
  SLURM_KILL_BAD_EXIT: 1

steps:
  - label: "init CMIP env :computer:"
    key: "init_cmip_env"
    command:
      - echo "--- Instantiate CMIP env"
      - "julia --project=experiments/CMIP/ -e 'using Pkg; Pkg.instantiate(;verbose=true)'"
      - "julia --project=experiments/CMIP/ -e 'using Pkg; Pkg.precompile()'"
      - "julia --project=experiments/CMIP/ -e 'using Pkg; Pkg.status()'"
    agents:
      queue: clima
      slurm_time: 01:00:00
      slurm_mem: 32GB
    env:
      JULIA_NUM_PRECOMPILE_TASKS: 8
      JULIA_MAX_NUM_PRECOMPILE_FILES: 50

  - wait

  - label: "GPU CMIP stability diagnostics"
    key: "stability_diagnostics"
    command:
      - "julia --color=yes --project=experiments/CMIP/ experiments/CMIP/stability_diagnostics.jl"
    artifact_paths: "output/stability_diagnostics/artifacts/*"
    timeout_in_minutes: 1440  # 24 hours; Test 1 runs up to 300 coupling steps
    env:
      CLIMACOMMS_DEVICE: "CUDA"
      STABILITY_CONFIG: "config/ci_configs/cmip_oceananigans_climaseaice.yml"
      STABILITY_N_STEPS: "500"
      STABILITY_JOB_ID: "stability_diagnostics"
    agents:
      queue: clima
      slurm_time: 24:00:00
      slurm_mem: 32GB
      slurm_gpus: 1
