agents:
  queue: central
  slurm_time: 30:00:00
  modules: climacommon/2025_05_15

env:
  JULIA_LOAD_PATH: "${JULIA_LOAD_PATH}:${BUILDKITE_BUILD_CHECKOUT_PATH}/.buildkite"
  OPENBLAS_NUM_THREADS: 1
  OMPI_MCA_opal_warn_on_missing_libcuda: 0
  JULIA_MAX_NUM_PRECOMPILE_FILES: 100
  GKSwstype: 100
  SLURM_KILL_BAD_EXIT: 1
  CONFIG_PATH: "config/longrun_configs"

timeout_in_minutes: 1800 # 30 hours

steps:
  - label: "init clima :computer:"
    key: "init_cpu_env_clima"
    command:
      - "echo $$JULIA_DEPOT_PATH"

      - echo "--- Instantiate CMIP env"
      - "julia --project=experiments/CMIP/ -e 'using Pkg; Pkg.instantiate(;verbose=true)'"
      - "julia --project=experiments/CMIP/ -e 'using Pkg; Pkg.precompile()'"
      - "julia --project=experiments/CMIP/ -e 'using Pkg; Pkg.status()'"

    agents:
      queue: clima
    env:
      JULIA_NUM_PRECOMPILE_TASKS: 8
      JULIA_MAX_NUM_PRECOMPILE_FILES: 50

  - wait

  - group: "Coupler integration and conservation tests"

    steps:
      - label: "Aquaplanet: evolving slab ocean"
        key: "slabplanet_aqua_evolve_ocean"
        command: "julia --color=yes --project=experiments/AMIP/ experiments/AMIP/run_simulation.jl --config_file $CONFIG_PATH/slabplanet_aqua_evolve_ocean.yml --job_id slabplanet_aqua_evolve_ocean"
        artifact_paths: "output/slabplanet_aqua_evolve_ocean/artifacts/*"
        agents:
          slurm_mem: 32GB

      - label: "Slabplanet: evolving slab ocean, bucket"
        key: "slabplanet_evolve_ocean"
        command: "julia --color=yes --project=experiments/AMIP/ experiments/AMIP/run_simulation.jl --config_file $CONFIG_PATH/slabplanet_evolve_ocean.yml --job_id slabplanet_evolve_ocean"
        artifact_paths: "output/slabplanet_evolve_ocean/artifacts/*"
        agents:
          slurm_mem: 32GB

  - group: "AMIP simulations"

    steps:

      - label: "GPU AMIP + ED only"
        key: "amip_edonly"
        command: "julia --color=yes --project=experiments/AMIP/ experiments/AMIP/run_simulation.jl --config_file $CONFIG_PATH/amip_edonly.yml --job_id amip_edonly"
        artifact_paths: "output/amip_edonly/artifacts/*"
        env:
          CLIMACOMMS_DEVICE: "CUDA"
        agents:
          queue: clima
          slurm_gpus_per_task: 1
          slurm_cpus_per_task: 4
          slurm_ntasks: 1
          slurm_mem: 32GB

      - label: "GPU AMIP + prog. EDMF + integrated land"
        key: "amip_progedmf_land"
        command:
          - "julia --color=yes --project=experiments/AMIP/ experiments/AMIP/run_simulation.jl --config_file $CONFIG_PATH/amip_progedmf_land.yml --job_id amip_progedmf_land"
        artifact_paths: "output/amip_progedmf_land/artifacts/*"
        env:
          CLIMACOMMS_DEVICE: "CUDA"
        agents:
          queue: clima
          slurm_gpus_per_task: 1
          slurm_cpus_per_task: 4
          slurm_ntasks: 1
          slurm_mem: 32GB

      - label: "GPU AMIP + prog. EDMF + integrated land + 2K SST"
        key: "amip_progedmf_land_p2k"
        command:
          - "julia --color=yes --project=experiments/AMIP/ experiments/AMIP/run_simulation.jl --config_file $CONFIG_PATH/amip_progedmf_land_p2k.yml --job_id amip_progedmf_land_p2k"
        artifact_paths: "output/amip_progedmf_land_p2k/artifacts/*"
        env:
          CLIMACOMMS_DEVICE: "CUDA"
        agents:
          queue: clima
          slurm_gpus_per_task: 1
          slurm_cpus_per_task: 4
          slurm_ntasks: 1
          slurm_mem: 32GB

      - label: "GPU AMIP + prog. EDMF + 1M + integrated land"
        key: "amip_progedmf_1m_land"
        command:
          - "julia --color=yes --project=experiments/AMIP/ experiments/AMIP/run_simulation.jl --config_file $CONFIG_PATH/amip_progedmf_1m_land.yml --job_id amip_progedmf_1m_land"
        artifact_paths: "output/amip_progedmf_1m_land/artifacts/*"
        env:
          CLIMACOMMS_DEVICE: "CUDA"
        agents:
          queue: clima
          slurm_gpus_per_task: 1
          slurm_cpus_per_task: 4
          slurm_ntasks: 1
          slurm_mem: 32GB

  - group: "CMIP simulations"

    steps:
      - label: "GPU CMIP: ED only + integrated land"
        key: "cmip_edonly_land"
        command:
            - "julia --color=yes --project=experiments/CMIP/ experiments/CMIP/run_simulation.jl --config_file $CONFIG_PATH/cmip_edonly_land.yml --job_id cmip_edonly_land"
        artifact_paths: "output/cmip_edonly_land/artifacts/*"
        env:
          CLIMACOMMS_DEVICE: "CUDA"
        agents:
          queue: clima
          slurm_mem: 32GB
          slurm_gpus: 1

      - label: "GPU CMIP: prog. EDMF + integrated land"
        key: "cmip_progedmf_land"
        command:
            - "julia --color=yes --project=experiments/CMIP experiments/CMIP/run_simulation.jl --config_file $CONFIG_PATH/cmip_progedmf_land.yml --job_id cmip_progedmf_land"
        artifact_paths: "output/cmip_progedmf_land/artifacts/*"
        env:
          CLIMACOMMS_DEVICE: "CUDA"
        agents:
          queue: clima
          slurm_mem: 32GB
          slurm_gpus: 1
