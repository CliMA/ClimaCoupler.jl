FLOAT_TYPE: "Float32"
albedo_model: "CouplerAlbedo"
atmos_config_file: "config/atmos_configs/climaatmos_diagedmf.yml"
bucket_albedo_type: "map_temporal"
checkpoint_dt: "366days"
coupler_toml: ["toml/amip.toml"]
dt: "120secs"
dt_cpl: "120secs"
energy_check: false
mode_name: "amip"
netcdf_output_at_levels: true
output_default_diagnostics: true
radiation_reset_rng_seed: true
start_date: "20100301"
surface_setup: "PrescribedSurface"
t_end: "366days"
topo_smoothing: true
topography: "Earth"
extra_atmos_diagnostics:
  - short_name: [ta, pfull, rhoa, ua, va, wa, hur, hus, cl, clw, cli, edt, evu]
    period: 1days
    reduction_time: max
  - short_name: [ts, hfss, hfls, lwp, clwvi, evspsbl, pr, rsdt, rsut, rlut, rlus, rlds, rlus]
    period: 1days
    reduction_time: max
